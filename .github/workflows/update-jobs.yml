name: Update jobs

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Fetch latest CSV from Google Sheets
        run: yarn fetch-csv

      - name: Check links
        run: yarn check-links

      - name: Import CSV to JSON
        run: yarn import-csv

      - name: Check for job data changes and count
        id: changes
        run: |
          if git diff --quiet slt-jobs.csv jobboard.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "old_count=0" >> "$GITHUB_OUTPUT"
            echo "new_count=0" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            OLD_COUNT=$(git show HEAD:jobboard.json | jq 'length')
            NEW_COUNT=$(jq 'length' jobboard.json)
            echo "old_count=$OLD_COUNT" >> "$GITHUB_OUTPUT"
            echo "new_count=$NEW_COUNT" >> "$GITHUB_OUTPUT"
            THRESHOLD=$(( OLD_COUNT / 2 ))
            if [ "$NEW_COUNT" -lt "$THRESHOLD" ]; then
              echo "::error::Job count dropped from $OLD_COUNT to $NEW_COUNT (>50% decrease). Aborting."
              exit 1
            fi
          fi

      - name: Read link check summary
        id: summary
        run: |
          ACTIVE=$(jq '.active' link-check-summary.json)
          INACTIVE=$(jq '.inactive' link-check-summary.json)
          INDETERMINATE=$(jq '.indeterminate' link-check-summary.json)
          SKIPPED=$(jq '.skipped' link-check-summary.json)
          TOTAL=$(jq '.total' link-check-summary.json)
          echo "active=$ACTIVE" >> "$GITHUB_OUTPUT"
          echo "inactive=$INACTIVE" >> "$GITHUB_OUTPUT"
          echo "indeterminate=$INDETERMINATE" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          BRANCH="update-jobs-$(date +%Y-%m-%d-%H%M)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add slt-jobs.csv jobboard.json link-check-summary.json
          git commit -m "update jobs $(date +'%b %-d')"
          git push -u origin "$BRANCH"

          # Build PR body
          if [ "${{ steps.changes.outputs.changed }}" == "true" ]; then
            OLD=${{ steps.changes.outputs.old_count }}
            NEW=${{ steps.changes.outputs.new_count }}
            JOB_DATA_SUMMARY="Job listings updated: $OLD → $NEW."
          else
            JOB_DATA_SUMMARY="No changes to job listings this run."
          fi

          LINK_CHECK_SUMMARY="Link check results: ${{ steps.summary.outputs.active }} active, ${{ steps.summary.outputs.inactive }} inactive (excluded), ${{ steps.summary.outputs.indeterminate }} indeterminate, ${{ steps.summary.outputs.skipped }} skipped (no URL). ${{ steps.summary.outputs.total }} total."

          gh pr create \
            --title "Update jobs $(date +'%b %-d')" \
            --body "${JOB_DATA_SUMMARY}"$'\n\n'"${LINK_CHECK_SUMMARY}" \
            --reviewer treymo
